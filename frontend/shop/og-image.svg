<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1322"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blob -->
  <circle cx="900" cy="315" r="300" fill="url(#glow)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Brand mark Z -->
  <g transform="translate(100, 200)">
    <rect width="120" height="120" rx="24" fill="url(#accent)"/>
    <text x="60" y="92" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="80" font-weight="900" fill="#fff">Z</text>
  </g>

  <!-- Title -->
  <text x="100" y="400" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="84" font-weight="900" fill="#fff" letter-spacing="-2">Z Store</text>

  <!-- Subtitle -->
  <text x="100" y="450" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="500" fill="#7dd3fc" letter-spacing="2">PREMIUM DIGITAL MARKETPLACE</text>

  <!-- Description -->
  <text x="100" y="510" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="400" fill="#cbd5e1">AI Tools · Software · Voucher · Instant Delivery</text>

  <!-- URL -->
  <text x="100" y="580" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#38bdf8">zcus.biz.id/shop</text>

  <!-- Badge -->
  <g transform="translate(940, 540)">
    <rect width="200" height="40" rx="20" fill="none" stroke="#10b981" stroke-width="2"/>
    <text x="100" y="26" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#10b981">⚡ INSTANT DELIVERY</text>
  </g>
</svg>
