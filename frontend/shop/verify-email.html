<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Email — Z Store</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#22c55e">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="styles.css?v=26">
<style>
.verify-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.verify-card{text-align:center;max-width:480px;padding:48px 32px;background:var(--glass);border:1px solid var(--glass-border);border-radius:24px}
.verify-icon{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto 24px;background:rgba(34,197,94,.15);color:#22c55e;box-shadow:0 0 40px rgba(34,197,94,.3);animation:successPop .5s cubic-bezier(.34,1.56,.64,1)}
.verify-icon.error{background:rgba(244,63,94,.15);color:#fb7184;box-shadow:0 0 40px rgba(244,63,94,.3)}
.verify-icon.loading{background:rgba(14,165,233,.15);color:#38bdf8;animation:pulse 1.5s infinite}
@keyframes successPop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.verify-title{font-size:28px;font-weight:800;margin:0 0 12px}
.verify-sub{font-size:14px;color:var(--text-dim);margin:0 0 28px;line-height:1.6}
.verify-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>
<div class="verify-wrap">
  <div class="verify-card" id="verifyCard">
    <div class="verify-icon loading" id="verifyIcon"><i class="fa-solid fa-spinner fa-spin"></i></div>
    <h1 class="verify-title" id="verifyTitle">Memverifikasi...</h1>
    <p class="verify-sub" id="verifySub">Mohon tunggu sebentar.</p>
    <div class="verify-actions" id="verifyActions"></div>
  </div>
</div>

<script>
const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://127.0.0.1:3002' : '/shop-app';

async function verify() {
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  if (!token) return renderError('Token tidak ditemukan', 'Pastikan kamu klik link dari email verifikasi.');
  try {
    const r = await fetch(API + '/api/auth/email/verify?token=' + encodeURIComponent(token));
    const d = await r.json();
    if (r.ok && d.ok) return renderSuccess();
    return renderError(d.error || 'Verifikasi gagal', 'Link mungkin sudah kadaluarsa atau sudah dipakai.');
  } catch (e) {
    return renderError('Tidak bisa terhubung ke server', 'Coba lagi nanti atau cek koneksi internet kamu.');
  }
}

function renderSuccess() {
  document.getElementById('verifyIcon').className = 'verify-icon';
  document.getElementById('verifyIcon').innerHTML = '<i class="fa-solid fa-circle-check"></i>';
  document.getElementById('verifyTitle').textContent = 'Email Terverifikasi!';
  document.getElementById('verifySub').textContent = 'Akun kamu sekarang terverifikasi. Security score +25.';
  document.getElementById('verifyActions').innerHTML = '<a href="/shop/settings.html" class="btn btn-primary"><i class="fa-solid fa-gear"></i> Buka Settings</a> <a href="/shop/" class="btn btn-ghost"><i class="fa-solid fa-house"></i> Beranda</a>';
}

function renderError(title, sub) {
  document.getElementById('verifyIcon').className = 'verify-icon error';
  document.getElementById('verifyIcon').innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
  document.getElementById('verifyTitle').textContent = title;
  document.getElementById('verifySub').textContent = sub;
  document.getElementById('verifyActions').innerHTML = '<a href="/shop/settings.html" class="btn btn-primary"><i class="fa-solid fa-rotate"></i> Kirim Ulang</a> <a href="/shop/" class="btn btn-ghost">Beranda</a>';
}

verify();
</script>
</body>
</html>
